# Builds the Community Store extension on every push/PR so breakage is caught early.
#
# The Java half compiles against the engine's own jars (mirth-server, mirth-crypto,
# donkey-model, mirth-client-core). CI has no OIE install, so it downloads a published
# OIE distribution and points OIE_HOME at it — the same variable a local build uses.

name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The OIE distribution supplying the compile-time engine jars. Bump when the engine
# API the store builds against moves (must be a published release with a unix tarball).
env:
  OIE_TAG: v4.6.0-rc1
  OIE_TARBALL: oie_unix_4_6_0-rc1.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache OIE distribution
        id: oie-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OIE_TARBALL }}
          key: oie-dist-${{ env.OIE_TAG }}

      - name: Download OIE distribution (engine jars)
        if: steps.oie-cache.outputs.cache-hit != 'true'
        run: curl -fSL -o "$OIE_TARBALL" "https://github.com/OpenIntegrationEngine/engine/releases/download/${OIE_TAG}/${OIE_TARBALL}"

      - name: Extract engine jars and set OIE_HOME
        run: |
          tar xzf "$OIE_TARBALL"
          test -f "$GITHUB_WORKSPACE/oie/server-lib/mirth-server.jar"
          test -f "$GITHUB_WORKSPACE/oie/client-lib/mirth-client.jar"
          echo "OIE_HOME=$GITHUB_WORKSPACE/oie" >> "$GITHUB_ENV"

      # Compiles the jar, builds the web frontend (plugin.jsx -> plugin.js via the
      # frontend-maven-plugin), and assembles target/communitystore-<version>.zip.
      - name: Build extension
        run: mvn -B -ntp -DskipTests package

      - name: Run web plugin tests
        working-directory: webadmin
        run: node web/markdown.test.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: communitystore-extension
          path: target/communitystore-*.zip
          if-no-files-found: error
